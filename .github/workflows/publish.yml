# publish.yml — Build multi-platform wheels and publish to PyPI via OIDC Trusted Publishing.
#
# Triggered by version tag pushes (v*). Builds manylinux (amd64 + arm64), macOS
# (x86_64 + arm64), Windows (x86_64), and an sdist. All artifacts are collected by
# the final publish job which uses pypa/gh-action-pypi-publish with OIDC — no
# hardcoded token required. The PyPI project must have a Trusted Publisher configured
# for this repository before this workflow can publish successfully.
#
# Usage:
#   git tag v1.2.3 && git push origin v1.2.3

name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build manylinux wheels (amd64 + arm64)
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - x86_64
          - aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build manylinux wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --strip --locked --out dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/

  # ─────────────────────────────────────────────
  # Job 2: Build macOS wheels (x86_64 + arm64)
  # ─────────────────────────────────────────────
  build-macos:
    name: Build macOS wheels (${{ matrix.target }})
    runs-on: macos-latest

    strategy:
      matrix:
        target:
          - x86_64
          - aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --locked --out dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/

  # ─────────────────────────────────────────────
  # Job 3: Build Windows wheels (x86_64)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows wheels (x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --strip --locked --out dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist/

  # ─────────────────────────────────────────────
  # Job 4: Build source distribution (sdist)
  # ─────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  # ─────────────────────────────────────────────
  # Job 5: Publish all artifacts to PyPI
  # Uses OIDC Trusted Publishing — no token needed.
  # Requires the PyPI project to have a Trusted
  # Publisher configured for this repository.
  # ─────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
      - build-sdist

    permissions:
      id-token: write  # Required for OIDC Trusted Publishing

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
