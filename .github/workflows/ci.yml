name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Rust workspace tests
  # ─────────────────────────────────────────────
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        id: fmt
        run: cargo fmt --all -- --check
        continue-on-error: true
      
      - name: Apply automatic formatting fixes
        if: steps.fmt.outcome == 'failure'
        run: cargo fmt --all

      - name: Commit formatting changes
        if: steps.fmt.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply automatic code formatting fixes"
          git push

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Run all Rust tests
        run: cargo test --workspace --verbose

  # ─────────────────────────────────────────────
  # Job 2: Python unit + integration tests
  # ─────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: rust-tests          # only run if Rust tests pass

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install maturin + test dependencies
        run: |
          pip install --upgrade pip
          pip install maturin pytest pytest-cov
          pip install -e .

      - name: Build and install VectorPrime in dev mode
        run: maturin build

      - name: Run Python unit tests (no fixtures required)
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=vectorprime --cov-report=term-missing

      - name: Run Python integration tests (skip fixture-dependent)
        run: |
          pytest tests/integration/ -v --tb=short \
            -m "not requires_fixtures and not requires_gpu"

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ─────────────────────────────────────────────
  # Job 3: Check that the package builds for pip
  # ─────────────────────────────────────────────
  build-check:
    name: Package Build Check
    runs-on: ubuntu-latest
    needs: rust-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel (verifies release build)
        run: maturin build --release

      - name: Check wheel installs cleanly
        run: |
          pip install target/wheels/*.whl
          vectorprime --help

  # ─────────────────────────────────────────────
  # Job 4: Coverage gate (≥ 70% required)
  # Runs on every push and PR; fails the build
  # when line coverage drops below the threshold.
  # ─────────────────────────────────────────────
  coverage:
    name: Coverage Gate (≥ 47%)
    runs-on: ubuntu-latest
    needs: rust-tests          # require Rust tests to pass first

    env:
      COVERAGE_THRESHOLD: "47"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust stable toolchain (with llvm-tools for tarpaulin)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo-tarpaulin binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: ${{ runner.os }}-tarpaulin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install maturin pytest pytest-cov

      - name: Build and install VectorPrime in dev mode
        run: maturin build

      - name: Install package
        run: pip install -e .

      - name: Run coverage gate
        run: bash scripts/coverity.sh

      - name: Upload Rust coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage/rust/

      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage/python/

