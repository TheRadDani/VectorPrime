name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Rust workspace tests
  # ─────────────────────────────────────────────
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Run all Rust tests
        run: cargo test --workspace --verbose

  # ─────────────────────────────────────────────
  # Job 2: Python unit + integration tests
  # ─────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: rust-tests          # only run if Rust tests pass

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install maturin + test dependencies
        run: |
          pip install --upgrade pip
          pip install maturin pytest pytest-cov

      - name: Build and install llmforge in dev mode
        run: maturin develop

      - name: Run Python unit tests (no fixtures required)
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=llmforge --cov-report=term-missing

      - name: Run Python integration tests (skip fixture-dependent)
        run: |
          pytest tests/integration/ -v --tb=short \
            -m "not requires_fixtures and not requires_gpu"

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ─────────────────────────────────────────────
  # Job 3: Check that the package builds for pip
  # ─────────────────────────────────────────────
  build-check:
    name: Package Build Check
    runs-on: ubuntu-latest
    needs: rust-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel (verifies release build)
        run: maturin build --release

      - name: Check wheel installs cleanly
        run: |
          pip install target/wheels/*.whl
          llmforge --help
