[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "llmforge"
version = "0.1.0"
requires-python = ">=3.9"
license = { file = "LICENSE" }

dependencies = [
    "numpy",
    "gguf",
    "onnx"
]

[project.scripts]
llmforge = "llmforge.cli:main"

[tool.maturin]
python-source = "python"
module-name = "llmforge._llmforge"
manifest-path = "crates/llmforge-bindings/Cargo.toml"

